<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST - Pausa Activa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pausa-activa.css}">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">SST - Módulo de Salud</span>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">Usuario: <strong th:text="${empleado.nombre}">Nombre</strong></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-danger btn-sm">Cerrar Sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row align-items-stretch">

        <div class="col-lg-7">
            <div class="camera-container position-relative bg-dark" style="overflow: hidden; border-radius: 10px; min-height: 480px;">
                <video id="videoElement" autoplay playsinline style="width: 100%; display: block;"></video>
                <canvas id="output_canvas" class="position-absolute top-0 start-0" style="width: 100%; height: 100%; pointer-events: none;"></canvas>
                <div id="cameraStatus" class="position-absolute top-50 start-50 translate-middle text-white fw-bold">Iniciando cámara...</div>
            </div>

            <div class="mt-3 text-center">
                <span class="badge bg-warning text-dark fs-5 p-2 shadow-sm" id="aiStatus">🤖 IA Esperando iniciar...</span>
            </div>

            <div class="progress mt-3" style="height: 10px;">
                <div id="rutinaProgress" class="progress-bar bg-success" role="progressbar" style="width: 10%;" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <p class="text-center text-muted small mt-1" id="progresoTexto">Ejercicio 1 de 10</p>
        </div>

        <div class="col-lg-5">
            <div class="card exercise-card p-4 h-100 shadow-sm">
                <h4 id="exerciseTitle" class="text-primary fw-bold">1. Cuello: Relajación</h4>

                <div class="my-3 text-center">
                    <img src="https://via.placeholder.com/300x200?text=Cuello" id="exerciseImage" class="img-fluid rounded shadow-sm" alt="Guía">
                </div>

                <p id="exerciseDesc" class="text-muted fs-5 fw-semibold instruction-text" style="min-height: 80px;"></p>

                <div class="timer-display text-center display-4 fw-bold text-dark my-3" id="timer">0s</div>

                <div class="mt-auto">
                    <button class="btn btn-success btn-lg w-100 mb-2" id="btnStart" onclick="iniciarTemporizador()">▶ EMPEZAR EJERCICIO</button>
                    <button class="btn btn-outline-primary w-100" id="btnNext" onclick="siguienteEjercicio()" disabled>Siguiente Ejercicio ⏭</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/pausa-activa.js?v=2}"></script>

</body>
</html>
